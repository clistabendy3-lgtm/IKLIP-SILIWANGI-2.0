    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(30,60,114,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      padding: 1.5rem 0;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .header-logo-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      display: block;
    }

    nav { display: flex; align-items: center; gap: 3rem; }

    .nav-item { position: relative; }

    .nav-link {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      background: none;
      border: none;
    }

    .nav-link:hover { color: #a8d8ff; }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: #a8d8ff;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after,
    .nav-link.active::after { width: 100%; }
    .nav-link.active { color: #a8d8ff; }

    .dropdown-toggle { cursor: pointer; display: flex; align-items: center; gap: 0.4rem; }

    .chevron {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-link.active .chevron { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border-radius: 8px;
      min-width: 280px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      margin-top: 0.5rem;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .dropdown-menu.open { opacity: 1; visibility: visible; transform: translateY(0); }

    .dropdown-item {
      padding: 1rem 1.5rem;
      color: #1e3c72;
      cursor: pointer;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .dropdown-item:last-child { border-bottom: none; }

    .dropdown-item:hover { background: #f8f9ff; padding-left: 2rem; color: #2a5298; }

    main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 3rem 2rem;
    }

    .content-section {
      background: white;
      border-radius: 12px;
      padding: 3rem;
      box-shadow: 0 10px 40px rgba(30,60,114,0.1);
      animation: slideInUp 0.5s ease;
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 { color: #1e3c72; font-size: 2.5rem; margin-bottom: 1.5rem; border-bottom: 3px solid #2a5298; padding-bottom: 1rem; }
    h2 { color: #2a5298; font-size: 1.8rem; margin-top: 2rem; margin-bottom: 1rem; }
    h3 { color: #1e3c72; font-size: 1.3rem; margin-bottom: 0.8rem; }
    p  { color: #555; line-height: 1.8; margin-bottom: 1rem; font-size: 0.95rem; }
    ul { margin-left: 1.5rem; margin-bottom: 1rem; }
    li { color: #555; margin-bottom: 0.8rem; line-height: 1.8; }

    .highlight-box {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
      border-left: 4px solid #2a5298;
      padding: 2rem;
      border-radius: 8px;
      margin: 2rem 0;
    }

    .highlight-box h3 { color: #1e3c72; margin-bottom: 1rem; }

    .info-grid, .faculty-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .info-card {
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #e0e8ff;
      transition: all 0.3s ease;
    }

    .info-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(42,82,152,0.15); }
    .info-card h3 { color: #2a5298; margin-bottom: 0.8rem; }
    .info-card p  { color: #1e3c72; font-size: 1.1rem; font-weight: 500; }

    .mission-box {
      background: linear-gradient(135deg, #fff8f0 0%, #fff0f8 100%);
      padding: 2rem;
      margin: 2rem 0;
      border-radius: 8px;
      border-left: 4px solid #2a5298;
    }

    .mission-box h2 { color: #2a5298; margin-top: 0; margin-bottom: 1.2rem; }

    .timeline { position: relative; padding: 2rem 0; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 30px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #2a5298 0%, #a8d8ff 100%);
    }

    .timeline-item {
      padding: 2rem 2rem 2rem 100px;
      margin-bottom: 2rem;
      position: relative;
      background: white;
      border-radius: 8px;
      border-left: 4px solid #f0f4ff;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 25px;
      width: 20px;
      height: 20px;
      background: white;
      border: 3px solid #2a5298;
      border-radius: 50%;
    }

    .year { position: absolute; left: 100px; top: 0; color: #2a5298; font-weight: 700; font-size: 1.2rem; }
    .timeline-item h3 { color: #1e3c72; margin-bottom: 0.5rem; margin-top: 0; }

    .legal-info, .accreditation-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .legal-card, .accred-card {
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
      padding: 2rem;
      border-radius: 8px;
      border-left: 4px solid #2a5298;
      box-shadow: 0 4px 15px rgba(42,82,152,0.08);
      transition: all 0.3s ease;
    }

    .legal-card:hover, .accred-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(42,82,152,0.15); }

    .legal-card h3, .accred-card h3 {
      color: #2a5298;
      margin-top: 0;
      border-bottom: 2px solid #a8d8ff;
      padding-bottom: 0.8rem;
      margin-bottom: 1rem;
    }

    .legal-card p, .accred-card p { margin-bottom: 0.6rem; font-size: 0.9rem; }

    .org-structure { margin-top: 3rem; }

    .org-level {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .org-box {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
      padding: 1.5rem 2rem;
      border-radius: 8px;
      border: 2px solid #2a5298;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(42,82,152,0.1);
      transition: all 0.3s ease;
    }

    .org-box.ceo {
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      border: 2px solid #1e3c72;
      min-width: 250px;
      padding: 2rem;
    }

    .org-box:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(42,82,152,0.2); }
    .org-box h3 { color: #2a5298; margin: 0 0 0.5rem 0; font-size: 1rem; }
    .org-box.ceo h3 { color: white; }
    .org-box p { color: #666; font-size: 0.85rem; margin: 0; }
    .org-box.ceo p { color: #a8d8ff; }

    .profile-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem 0 2rem;
    }

    .profile-hero-img {
      width: 320px;
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(42,82,152,0.15);
      border: 4px solid rgba(42, 82, 152, 0.25);
    }

    .news-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .news-card {
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
      border-left: 4px solid #2a5298;
      padding: 2rem;
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(42,82,152,0.08);
    }

    .news-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(42,82,152,0.15); }
    .news-date { color: #2a5298; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.8rem; }
    .news-card h3 { color: #1e3c72; margin-top: 0; margin-bottom: 1rem; }

    .read-more {
      color: #2a5298;
      text-decoration: none;
      font-weight: 500;
      display: inline-block;
      margin-top: 1rem;
      transition: all 0.3s ease;
    }

    .read-more:hover { color: #1e3c72; transform: translateX(5px); }

    .facility-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .facility-card {
      background: linear-gradient(135deg, #fff0f8 0%, #f8f0ff 100%);
      padding: 1.8rem;
      border-radius: 8px;
      border: 2px solid #e0c8ff;
      transition: all 0.3s ease;
    }

    .facility-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(42,82,152,0.12); }
    .facility-card h3 { color: #2a5298; margin-top: 0; margin-bottom: 0.8rem; font-size: 1.1rem; }
    .facility-card p  { color: #666; font-size: 0.9rem; margin: 0; }

    .program-detail {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .detail-box {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
      padding: 1.5rem;
      border-radius: 8px;
      border-left: 4px solid #2a5298;
      text-align: center;
    }

    .detail-box h3 { color: #2a5298; margin-top: 0; font-size: 1rem; }
    .detail-box p  { color: #1e3c72; font-weight: 500; margin: 0; }

    .career-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin: 2rem 0;
    }

    .career-card {
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: white;
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(42,82,152,0.2);
    }

    .career-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(42,82,152,0.3); }

    @media (max-width: 768px) {
      .header-content { flex-direction: column; gap: 1rem; padding: 1rem; }
      nav { gap: 1.5rem; width: 100%; justify-content: center; flex-wrap: wrap; }
      main { padding: 1.5rem 1rem; }
      .content-section { padding: 1.5rem; }
      h1 { font-size: 1.8rem; }
      .dropdown-menu { min-width: 240px; }
    }
  </style>
</head>

  <template id="page-sejarah">
    <div class="content-section">
      <h1>Sejarah Singkat STKIP Siliwangi Bandung</h1>
      <p>
        Berdirinya STKIP Siliwangi Bandung berbeda dengan perguruan tinggi swasta lainnya. STKIP Siliwangi Bandung tidak didirikan oleh sebuah yayasan yang sudah ada sebelumnya, tetapi didirikan atas perintah Pangdam VI/Siliwangi pada tanggal 11 Maret 1986 sebagai persiapan berdirinya “UNIVERSITAS DUA PULUH MEI” (UNDAM) atau “Universitas Islam Siliwangi” (UNISI). Dalam hal ini STKIP Siliwangi Bandung melaksanakan Visi dan Misi Kodam III/Siliwangi sebagai wujud bakti dan balas budi Siliwangi terhadap masyarakat Jawa Barat dan Banten.
      </p>
      <p>
        Setelah STKIP Siliwangi Bandung berdiri dan eksis barulah mencari yayasan yang menaungi. Pada saat itu STKIP Siliwangi Bandung menjatuhkan pilihannya pada Yayasan Kartika Siliwangi yang pelaksanaannya dilakukan pada tanggal 1 April 1987 berdasarkan surat perintah Pangdam.
      </p>
      <p>
        Pada tahun 2004 Yayasan Kartika Siliwangi dibubarkan seiring dengan dikeluarkannya undang – undang nomor 34 tahun 2004 tentang larangan anggota Tentara Nasional Indonesia berbisnis. Eksistensi STKIP Siliwangi Bandung tidak terpengaruh oleh bubarnya yayasan, bahkan semakin berkembang. Karena peraturan pemerintah yang mengharuskan sebuah PTS berada dalam naungan yayasan, maka STKIP Siliwangi Bandung kembali mencari yayasan untuk menaunginya. Beberapa orang pimpinan mengusulkan untuk merintis yayasan baru walaupun ada tidaknya yayasan, STKIP Siliwangi Bandung bisa tetap berjalan.
      </p>
      <p>
        Pada tahun 2008, STKIP Siliwangi Bandung menjatuhkan pilihannya kepada Yayasan Kartika Jaya Cabang XIX/Siliwangi, namun karena Yayasan Kartika Jaya Cabang XIX/Siliwangi berada di bawah Yayasan Kartika Jaya, maka pada tahun 2017 Yayasan Kartika Jaya merupakan yayasan yang sah sebagai Badan Penyelenggara STKIP Siliwangi Bandung, sehingga sampai akhirnya STKIP Siliwangi melakukan perubahan bentuk menjadi Institut Keguruan dan Ilmu Pendidikan (IKIP) Siliwangi berdasarkan SK Menristek Dikti No. 673/KPT/I/2017 tanggal 5 Desember 2017.
      </p>
    </div>
  </template>

        </div>
        <div class="org-level">
          <div class="org-box"><h3>Divisi Produksi</h3></div>
          <div class="org-box"><h3>Divisi Pemasaran</h3></div>
          <div class="org-box"><h3>Divisi IT</h3></div>
          <div class="org-box"><h3>Divisi Kualitas</h3></div>
        </div>
      </div>
    </div>
  </template>

  <script>
    let currentPage = 'home';
    let openDropdown = null;

    const dropdownParents = {
      'fak-teknik': 'fakultas', 'fak-bisnis': 'fakultas',
      'fak-hukum': 'fakultas', 'fak-kesehatan': 'fakultas',
      'ps-si': 'prodi', 'ps-ti': 'prodi', 'ps-akun': 'prodi',
      'ps-mnj': 'prodi', 'ps-hk': 'prodi',
      'profil': 'tentang', 'visiMisi': 'tentang', 'sejarah': 'tentang',
      'legalitas': 'tentang', 'akreditasi': 'tentang', 'struktur': 'tentang'
    };

    function navigate(page) {
      currentPage = page;
      closeAllDropdowns();

      // Update active nav link
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      const directLinks = { home: 'nav-home', berita: 'nav-berita' };
      if (directLinks[page]) {
        document.getElementById(directLinks[page]).classList.add('active');
      } else if (dropdownParents[page]) {
        document.getElementById('nav-' + dropdownParents[page]).classList.add('active');
      }

      // Render content
      const template = document.getElementById('page-' + page);
      const main = document.getElementById('main-content');
      if (template) {
        main.innerHTML = '';
        main.appendChild(template.content.cloneNode(true));
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleDropdown(name) {
      if (openDropdown === name) {
        closeAllDropdowns();
      } else {
        closeAllDropdowns();
        openDropdown = name;
        document.getElementById('dropdown-' + name).classList.add('open');
        document.getElementById('nav-' + name).classList.add('active');
      }
    }

    function closeAllDropdowns() {
      openDropdown = null;
      document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
      // Remove active from dropdown toggles (but keep active on current page link)
      ['nav-fakultas', 'nav-prodi', 'nav-tentang'].forEach(id => {
        const el = document.getElementById(id);
        // Only remove active if the current page isn't under this dropdown
        const isParent = Object.entries(dropdownParents).some(
          ([pg, parent]) => pg === currentPage && 'nav-' + parent === id
        );
        if (!isParent) el.classList.remove('active');
      });
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.nav-item')) closeAllDropdowns();
    });

    // Initial render
    navigate('home');
  </script>
</body>
</html>
